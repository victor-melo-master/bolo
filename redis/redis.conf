# ==============================================================
# redis.conf – BOLO MVP
# Seguridad + persistencia mínima para desarrollo
# ==============================================================

# --- Autenticación ---
# La contraseña se inyecta en tiempo de arranque via entrypoint.sh
# Ver: ./redis/docker-entrypoint.sh
# requirepass se setea dinámicamente desde el secret

# --- Red ---
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 128
timeout 0
tcp-keepalive 300

# --- Seguridad: deshabilita comandos peligrosos ---
# Deshabilitado completamente
rename-command FLUSHALL   ""
# Deshabilitado completamente
rename-command FLUSHDB    ""
# Ofuscado
rename-command CONFIG     "BOLO_CONFIG_9f3a2b"
# Deshabilitado completamente
rename-command DEBUG      ""
# Deshabilitado completamente
rename-command SLAVEOF    ""

# --- Persistencia ---
# RDB: snapshot cada 5 min si hubo al menos 1 cambio (suficiente para dev)
save 300 1
save 60  100
dbfilename dump.rdb
dir /data

# AOF desactivado en dev (activar en producción)
appendonly no

# --- Memoria ---
maxmemory 100mb
# Evita las claves menos usadas cuando se llena
maxmemory-policy allkeys-lru

# --- Logging ---
loglevel notice
# Stdout (visible con docker logs)
logfile ""

# --- Límite de conexiones ---
maxclients 100
