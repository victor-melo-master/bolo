# ==============================================================
# pg_hba.conf – BOLO MVP
# Solo permite autenticación SCRAM-SHA-256 (sin md5 ni trust)
# ==============================================================

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Conexiones locales (dentro del contenedor, p.ej. pg_isready)
local   all             all                                     scram-sha-256

# IPv4: solo desde la red interna de Docker (172.16.0.0/12)
host    all             all             172.16.0.0/12           scram-sha-256

# IPv6 loopback
host    all             all             ::1/128                 scram-sha-256

# Rechaza cualquier otra conexión
host    all             all             0.0.0.0/0               reject
