server {
    listen 8080;                      # Puerto no privilegiado para el usuario 'bolo'
    server_name localhost;

    # ── Security headers (A05) ────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Content Security Policy: restringe orígenes; connect-src debe permitir la API del gateway
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

    # HSTS (activar solo con HTTPS)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Root y SPA routing ────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;   # Fallback a index.html para React Router
    }
}